<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream - Platform VoD Premium</title>
    <!-- Google Fonts: Montserrat untuk judul dramatis, Roboto untuk teks body -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Plyr: video player premium + HLS.js untuk streaming -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>

</head>

<body>

    <!-- Navigasi -->
    <nav id="navbar">
        <a href="#" class="logo">Redline TV</a>
        <ul class="nav-links" id="genre-filters">
            <li><a class="active" data-genre="Semua">Semua</a></li>
            <li><a data-genre="Aksi">Aksi</a></li>
            <li><a data-genre="Drama">Drama</a></li>
            <li><a data-genre="Dokumenter">Dokumenter</a></li>
        </ul>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Cari film...">
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1 class="hero-title">ADV Adin</h1>
            <p class="hero-desc">Saksikan ADV Adin Awikwok sampai akhir</p>
            <button class="btn btn-primary" onclick="openModal('videos/adv-adin/adv-adin_master.m3u8')">Tonton Sekarang</button>
        </div>
    </header>

    <!-- Konten Utama: Daftar Video -->
    <main class="content-section">
        <h2 class="section-title" id="section-title">Film Pilihan</h2>
        <div class="video-grid" id="videoGrid">
            <!-- Kartu Video akan di-render di sini oleh JavaScript -->
        </div>
        <div class="no-results" id="noResults">
            Maaf, film tidak ditemukan.
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 RedlineTV. Platform VoD Premium by Krizzeki.</p>
    </footer>

    <!-- Video Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="video-container" id="playerContainer">
                <video id="videoPlayer" playsinline controls></video>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
